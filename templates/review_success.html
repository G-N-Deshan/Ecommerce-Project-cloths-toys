{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submitted</title>
    <link rel="stylesheet" href="{% static 'review-form.css' %}">
    <link rel="stylesheet" href="{% static 'navbar.css' %}">
    <link rel="stylesheet" href="{% static 'footer.css' %}">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 12% 8%,rgba(99,102,241,.10),transparent 30%),radial-gradient(circle at 88% 16%,rgba(236,72,153,.10),transparent 32%),linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%); }
        .rs-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .rs-s { position: absolute; opacity: .07; animation: rsFloat 8s ease-in-out infinite; }
        .rs-s--c { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg,#6366f1,#818cf8); top: 14%; left: 7%; animation-duration: 7s; }
        .rs-s--sq { width: 65px; height: 65px; border-radius: 14px; background: linear-gradient(135deg,#ec4899,#f472b6); bottom: 20%; right: 9%; animation-delay: 2s; animation-duration: 9s; transform: rotate(45deg); }
        .rs-s--r { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(99,102,241,.1); top: 50%; right: 16%; animation-delay: 3.5s; animation-duration: 10s; }
        .rs-s--star1 { width: 40px; height: 40px; background: rgba(251,191,36,.15); top: 18%; left: 40%; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: rsStar 6s ease-in-out infinite; }
        .rs-s--star2 { width: 28px; height: 28px; background: rgba(99,102,241,.12); bottom: 35%; left: 20%; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: rsStar 8s ease-in-out infinite 2s; }
        .rs-s--wave1 { width: 80px; height: 12px; border-radius: 30px; background: linear-gradient(90deg, rgba(236,72,153,.12), transparent); top: 60%; right: 8%; animation: rsWave 9s ease-in-out infinite; }
        .rs-s--wave2 { width: 55px; height: 8px; border-radius: 20px; background: linear-gradient(90deg, rgba(99,102,241,.1), transparent); bottom: 15%; left: 40%; animation: rsWave 11s ease-in-out infinite reverse; }
        .rs-s--dot { width: 22px; height: 22px; border-radius: 50%; background: rgba(16,185,129,.15); top: 40%; left: 8%; animation: rsFloat 6s ease-in-out infinite 1s; }
        @keyframes rsFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-22px) rotate(5deg); }
            50% { transform: translateY(-34px) rotate(-4deg); }
            75% { transform: translateY(-14px) rotate(3deg); }
        }
        @keyframes rsStar {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: .15; }
            50%  { transform: scale(1.3) rotate(72deg); opacity: .06; }
        }
        @keyframes rsWave {
            0%   { transform: translateX(0) scaleX(1); opacity: .12; }
            50%  { transform: translateX(40px) scaleX(1.4); opacity: .04; }
            100% { transform: translateX(0) scaleX(1); opacity: .12; }
        }
        .review-form { position: relative; z-index: 1; animation: rsSlideUp .55s ease-out; }
        @keyframes rsSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <link rel="stylesheet" href="{% static 'scroll-reveal.css' %}">
</head>
<body>
    {% include 'navbar.html' %}

    <!-- 3D Floating Shapes -->
    <div class="rs-shapes" aria-hidden="true">
        <div class="rs-s rs-s--c"></div>
        <div class="rs-s rs-s--sq"></div>
        <div class="rs-s rs-s--r"></div>
        <div class="rs-s rs-s--star1"></div>
        <div class="rs-s rs-s--star2"></div>
        <div class="rs-s rs-s--wave1"></div>
        <div class="rs-s rs-s--wave2"></div>
        <div class="rs-s rs-s--dot"></div>
    </div>
    
    <section class="review-form" style="text-align: center;" data-reveal="scale">
        <h1>✓ Review Submitted Successfully!</h1>
        <p style="color: #475569; margin: 20px 0;">Thank you for your feedback.</p>
        <a href="/" style="color: #6366f1; text-decoration: none; font-weight: 600;">← Back to Home</a>
    </section>
    
    {% include 'footer.html' %}
    <script src="{% static 'scroll-reveal.js' %}"></script>
</body>
</html>
