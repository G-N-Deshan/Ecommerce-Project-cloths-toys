{% extends 'base.html' %}
{% load static %}

{% block title %}Page Not Found — KidZone{% endblock %}

{% block content %}
<style>
    .e4-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .e4-s { position: absolute; opacity: .1; }
    .e4-s--c1 { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg,#818cf8,#c084fc); top: 10%; left: 8%; animation: e4Glitch 4s ease-in-out infinite; }
    .e4-s--c2 { width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(236,72,153,.15); bottom: 20%; right: 12%; animation: e4Glitch 5s ease-in-out infinite 1s; }
    .e4-s--sq1 { width: 70px; height: 70px; border-radius: 14px; background: linear-gradient(135deg,#ec4899,#f472b6); top: 50%; right: 5%; animation: e4Shake 6s ease-in-out infinite; transform: rotate(45deg); }
    .e4-s--sq2 { width: 45px; height: 45px; border-radius: 10px; border: 3px solid rgba(99,102,241,.12); bottom: 35%; left: 15%; animation: e4Shake 8s ease-in-out infinite reverse; }
    .e4-s--dot1 { width: 20px; height: 20px; border-radius: 50%; background: rgba(251,191,36,.2); top: 30%; left: 45%; animation: e4Glitch 3s ease-in-out infinite 0.5s; }
    .e4-s--dot2 { width: 14px; height: 14px; border-radius: 50%; background: rgba(99,102,241,.15); bottom: 45%; right: 35%; animation: e4Glitch 3.5s ease-in-out infinite 2s; }
    .e4-s--line1 { width: 80px; height: 3px; background: linear-gradient(90deg, rgba(236,72,153,.15), transparent); top: 65%; left: 5%; animation: e4Shake 7s ease-in-out infinite; }
    .e4-s--line2 { width: 55px; height: 3px; background: linear-gradient(90deg, rgba(99,102,241,.12), transparent); top: 20%; right: 25%; animation: e4Shake 9s ease-in-out infinite 3s; }
    @keyframes e4Glitch {
        0%, 100% { transform: translate(0, 0); opacity: .1; }
        20% { transform: translate(-5px, 3px); opacity: .15; }
        40% { transform: translate(4px, -5px); opacity: .05; }
        60% { transform: translate(-3px, -2px); opacity: .12; }
        80% { transform: translate(5px, 4px); opacity: .08; }
    }
    @keyframes e4Shake {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-8px) rotate(-3deg); }
        50% { transform: translateX(6px) rotate(2deg); }
        75% { transform: translateX(-4px) rotate(-1deg); }
    }
</style>
<div class="e4-shapes" aria-hidden="true">
    <div class="e4-s e4-s--c1"></div>
    <div class="e4-s e4-s--c2"></div>
    <div class="e4-s e4-s--sq1"></div>
    <div class="e4-s e4-s--sq2"></div>
    <div class="e4-s e4-s--dot1"></div>
    <div class="e4-s e4-s--dot2"></div>
    <div class="e4-s e4-s--line1"></div>
    <div class="e4-s e4-s--line2"></div>
</div>
<section class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="text-center max-w-lg">
        <div class="text-9xl font-black bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent mb-4">404</div>
        <h1 class="text-2xl font-bold text-slate-800 mb-3">Oops! Page Not Found</h1>
        <p class="text-slate-500 mb-8">The page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
        <div class="flex flex-wrap justify-center gap-3">
            <a href="{% url 'index' %}" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition">
                <i class="bi bi-house-fill mr-2"></i>Go Home
            </a>
            <a href="{% url 'buy' %}" class="px-6 py-3 bg-white border-2 border-indigo-200 hover:border-indigo-400 text-indigo-600 rounded-xl font-semibold transition">
                <i class="bi bi-bag-fill mr-2"></i>Shop Now
            </a>
        </div>
    </div>
</section>
{% endblock %}
