{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'navbar.css' %}">
    <link rel="stylesheet" href="{% static 'footer.css' %}">
    <style>
        body {
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(16, 185, 129, 0.12), transparent 30%),
                radial-gradient(circle at 88% 16%, rgba(14, 165, 233, 0.12), transparent 32%),
                linear-gradient(180deg, #f0fdf4 0%, #f8fafc 100%);
        }

        .title-font {
            font-family: "Playfair Display", serif;
        }

        .success-shell {
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid #d1fae5;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(8px);
            position: relative; z-index: 1;
            animation: csSlideUp .55s ease-out;
        }
        /* Floating Shapes */
        .cs-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .cs-s { position: absolute; opacity: .07; animation: csFloat 8s ease-in-out infinite; }
        .cs-s--c { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg,#10b981,#34d399); top: 12%; left: 6%; animation-duration: 7s; }
        .cs-s--sq { width: 70px; height: 70px; border-radius: 14px; background: linear-gradient(135deg,#6366f1,#818cf8); bottom: 18%; right: 7%; animation-delay: 2s; animation-duration: 9s; transform: rotate(45deg); }
        .cs-s--r { width: 85px; height: 85px; border-radius: 50%; border: 4px solid rgba(14,165,233,.12); top: 48%; right: 14%; animation-delay: 3.5s; animation-duration: 10s; }
        .cs-s--confetti1 { width: 12px; height: 35px; border-radius: 4px; background: rgba(16,185,129,.18); top: 20%; left: 35%; animation: csConfetti 7s ease-in-out infinite; }
        .cs-s--confetti2 { width: 10px; height: 28px; border-radius: 4px; background: rgba(99,102,241,.15); bottom: 25%; right: 30%; animation: csConfetti 9s ease-in-out infinite reverse; }
        .cs-s--pop1 { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, rgba(16,185,129,.15), transparent 70%); top: 65%; left: 10%; animation: csPop 5s ease-out infinite; }
        .cs-s--pop2 { width: 35px; height: 35px; border-radius: 50%; background: radial-gradient(circle, rgba(14,165,233,.12), transparent 70%); top: 30%; right: 40%; animation: csPop 6s ease-out infinite 2s; }
        .cs-s--dot { width: 25px; height: 25px; border-radius: 50%; background: rgba(251,191,36,.15); bottom: 40%; left: 50%; animation: csFloat 6s ease-in-out infinite 1s; }
        @keyframes csFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-24px) rotate(5deg); }
            50% { transform: translateY(-35px) rotate(-4deg); }
            75% { transform: translateY(-14px) rotate(3deg); }
        }
        @keyframes csConfetti {
            0%   { transform: translateY(0) rotate(0deg); opacity: .18; }
            50%  { transform: translateY(-40px) rotate(180deg); opacity: .06; }
            100% { transform: translateY(0) rotate(360deg); opacity: .18; }
        }
        @keyframes csPop {
            0%   { transform: scale(0.6); opacity: .15; }
            50%  { transform: scale(1.3); opacity: .04; }
            100% { transform: scale(0.6); opacity: .15; }
        }
        @keyframes csSlideUp {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <link rel="stylesheet" href="{% static 'scroll-reveal.css' %}">
</head>
<body>
    {% include 'navbar.html' %}

    <!-- 3D Floating Shapes -->
    <div class="cs-shapes" aria-hidden="true">
        <div class="cs-s cs-s--c"></div>
        <div class="cs-s cs-s--sq"></div>
        <div class="cs-s cs-s--r"></div>
        <div class="cs-s cs-s--confetti1"></div>
        <div class="cs-s cs-s--confetti2"></div>
        <div class="cs-s cs-s--pop1"></div>
        <div class="cs-s cs-s--pop2"></div>
        <div class="cs-s cs-s--dot"></div>
    </div>

    <main class="mx-auto w-[94%] max-w-4xl py-16 md:py-20">
        <section class="success-shell p-8 md:p-12 text-center" data-reveal="scale">
            <div class="mx-auto w-20 h-20 rounded-full bg-emerald-100 text-emerald-600 grid place-items-center text-4xl font-extrabold">&#10003;</div>
            <h1 class="title-font mt-6 text-4xl md:text-5xl font-bold text-slate-900">Message Sent Successfully</h1>
            <p class="mt-4 text-slate-600 text-lg">Thank you for reaching out. Our support team will get back to you within 24 hours.</p>

            <div class="mt-8 flex flex-wrap gap-3 justify-center">
                <a href="{% url 'index' %}" class="rounded-full bg-gradient-to-r from-emerald-500 to-teal-500 px-7 py-3 text-white font-extrabold">Back to Home</a>
                <a href="{% url 'contact_us' %}" class="rounded-full border border-emerald-200 bg-white px-7 py-3 text-emerald-700 font-extrabold">Send Another Message</a>
            </div>
        </section>
    </main>

    {% include 'footer.html' %}
    <script src="{% static 'scroll-reveal.js' %}"></script>
</body>
</html>
