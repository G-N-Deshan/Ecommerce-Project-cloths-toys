{% if breadcrumbs %}
<nav aria-label="Breadcrumb" style="padding:12px 24px;font-size:.82rem;">
    <ol style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;list-style:none;margin:0;padding:0;">
        <li><a href="/" style="color:#6366f1;text-decoration:none;font-weight:600;">Home</a></li>
        {% for crumb in breadcrumbs %}
        <li style="display:flex;align-items:center;gap:6px;">
            <span style="color:#94a3b8;">/</span>
            {% if crumb.url %}
            <a href="{{ crumb.url }}" style="color:#6366f1;text-decoration:none;font-weight:500;">{{ crumb.label }}</a>
            {% else %}
            <span style="color:#475569;font-weight:600;">{{ crumb.label }}</span>
            {% endif %}
        </li>
        {% endfor %}
    </ol>
</nav>
{% endif %}
