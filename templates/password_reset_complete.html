{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - KidZone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'navbar.css' %}">
    <link rel="stylesheet" href="{% static 'footer.css' %}">
    <style>
        :root { --primary: #6366f1; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .reset-container { max-width: 440px; margin: 4rem auto; padding: 0 1rem; }
        .reset-card {
            background: #fff; border-radius: 1.5rem; padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
        }
        .reset-icon { font-size: 3rem; margin-bottom: 1rem; }
        .reset-card h1 { font-size: 1.5rem; color: #10b981; margin-bottom: 0.5rem; }
        .reset-card p { color: #64748b; font-size: 0.9rem; line-height: 1.6; }
        .btn-login {
            display: inline-block; margin-top: 1.5rem; padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; border-radius: 0.75rem; text-decoration: none;
            font-weight: 600; transition: opacity 0.3s;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-home {
            display: inline-block;
            margin-top: 0.6rem;
            color: #334155;
            text-decoration: none;
            font-size: 0.86rem;
        }
        .btn-home:hover { text-decoration: underline; }
        @media (max-width: 640px) {
            .reset-card { padding: 1.4rem; }
            .reset-card h1 { font-size: 1.25rem; }
        }

        /* Floating 3D shapes */
        .pr-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .pr-s { position: absolute; opacity: .07; animation: prFloat 8s ease-in-out infinite; }
        .pr-s--c  { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg,#818cf8,#c084fc); top: 10%; right: 8%; animation-duration: 7s; }
        .pr-s--sq { width: 65px; height: 65px; border-radius: 14px; background: linear-gradient(135deg,#ec4899,#f472b6); bottom: 18%; left: 5%; animation-delay: 2s; animation-duration: 9s; transform: rotate(45deg); }
        .pr-s--r  { width: 75px; height: 75px; border-radius: 50%; border: 4px solid rgba(99,102,241,.12); top: 50%; left: 10%; animation-delay: 3.5s; animation-duration: 10s; }
        .pr-s--glow1 { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(16,185,129,.14), transparent 65%); top: 20%; right: 15%; animation: prcoGlow 5s ease-in-out infinite; }
        .pr-s--glow2 { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,.1), transparent 65%); bottom: 30%; left: 30%; animation: prcoGlow 7s ease-in-out infinite 2s; }
        .pr-s--rise1 { width: 12px; height: 35px; border-radius: 6px; background: linear-gradient(to top, rgba(99,102,241,.15), transparent); top: 60%; right: 40%; animation: prcoRise 8s ease-in-out infinite; }
        .pr-s--rise2 { width: 8px; height: 25px; border-radius: 4px; background: linear-gradient(to top, rgba(16,185,129,.12), transparent); bottom: 15%; left: 55%; animation: prcoRise 10s ease-in-out infinite 3s; }
        .pr-s--dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(251,191,36,.14); top: 40%; left: 60%; animation: prFloat 6s ease-in-out infinite 1s; }
        @keyframes prFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-18px) rotate(6deg); }
            50% { transform: translateY(-28px) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(4deg); }
        }
        @keyframes prcoGlow {
            0%, 100% { transform: scale(1); opacity: .14; }
            50%  { transform: scale(1.5); opacity: .03; }
        }
        @keyframes prcoRise {
            0%, 100% { transform: translateY(0) scaleY(1); opacity: .15; }
            50%  { transform: translateY(-30px) scaleY(1.4); opacity: .04; }
        }
    </style>
</head>
<body>
{% include 'navbar.html' %}

<!-- 3D Floating Shapes -->
<div class="pr-shapes" aria-hidden="true">
    <div class="pr-s pr-s--c"></div>
    <div class="pr-s pr-s--sq"></div>
    <div class="pr-s pr-s--r"></div>
    <div class="pr-s pr-s--glow1"></div>
    <div class="pr-s pr-s--glow2"></div>
    <div class="pr-s pr-s--rise1"></div>
    <div class="pr-s pr-s--rise2"></div>
    <div class="pr-s pr-s--dot"></div>
</div>

<div class="reset-container" style="position:relative;z-index:1;">
    <div class="reset-card">
        <div class="reset-icon">✅</div>
        <h1>Password Reset Complete!</h1>
        <p>Your password has been set successfully. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn-login">Go to Login</a>
        <a href="{% url 'index' %}" class="btn-home">Back to Home</a>
    </div>
</div>

{% include 'footer.html' %}
</body>
</html>
