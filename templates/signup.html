{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'login.css' %}?v=2">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter'] },
                    colors: { brand: '#6366f1', accent: '#f59e0b' }
                }
            }
        }
    </script>
    <style>
        .su-strength-bar {
            height: 3px;
            background: rgba(148, 163, 184, 0.26);
            border-radius: 99px;
            overflow: hidden;
            margin-top: -0.25rem;
        }

        .su-strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            transition: width 0.4s ease, background 0.4s ease;
        }
    </style>
    <title>Sign Up — G11 Fashion & Toys</title>
</head>
<body class="font-inter min-h-screen overflow-x-hidden relative bg-slate-50">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-5 right-5 z-[9999] max-w-sm space-y-2 pointer-events-none"></div>

    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% for message in messages %}
            showToast('{{ message|escapejs }}', '{{ message.tags }}');
            {% endfor %}
        });
    </script>
    {% endif %}

    {% if form.errors %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            showToast('{{ form.errors|escapejs }}', 'error');
        });
    </script>
    {% endif %}

    <!-- ══════ SIGNUP FORM CARD ══════ -->
    <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
        <div class="lg-card reveal-lg" style="--d:0">

            <!-- Header -->
            <div class="text-center mb-8 reveal-lg" style="--d:1">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-600 shadow-lg shadow-sky-500/30 mb-4">
                    <i class="bi bi-person-plus-fill text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Create Account</h1>
                <p class="text-slate-500 text-sm mt-1">Join G11 Fashion & Toys today</p>
            </div>

            <!-- Google OAuth Button -->
            <div class="reveal-lg" style="--d:2">
                <a href="/accounts/google/login/" class="lg-google-btn group">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span class="font-semibold text-sm">Continue with Google</span>
                </a>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6 reveal-lg" style="--d:3">
                <div class="flex-1 h-px bg-slate-200"></div>
                <span class="text-slate-400 text-xs font-medium uppercase tracking-wider">or sign up with email</span>
                <div class="flex-1 h-px bg-slate-200"></div>
            </div>

            <!-- Signup Form -->
            <form action="{% url 'signup' %}" method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- Row: Username + Full Name -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reveal-lg" style="--d:4">
                    <div class="lg-input-group">
                        <i class="bi bi-person lg-input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Username" required
                               class="lg-input" autocomplete="username" value="{{ signup_data.username|default:'' }}">
                    </div>
                    <div class="lg-input-group">
                        <i class="bi bi-person-badge lg-input-icon"></i>
                        <input type="text" id="full_name" name="full_name" placeholder="Full Name"
                               class="lg-input" value="{{ signup_data.full_name|default:'' }}">
                    </div>
                </div>

                <!-- Email -->
                <div class="lg-input-group reveal-lg" style="--d:5">
                    <i class="bi bi-envelope lg-input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="Email address" required
                           class="lg-input" autocomplete="email" value="{{ signup_data.email|default:'' }}">
                </div>

                <!-- Row: Address + Phone -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 reveal-lg" style="--d:6">
                    <div class="lg-input-group">
                        <i class="bi bi-geo-alt lg-input-icon"></i>
                        <input type="text" id="address" name="address" placeholder="Address" required
                               class="lg-input" value="{{ signup_data.address|default:'' }}">
                    </div>
                    <div class="lg-input-group">
                        <i class="bi bi-telephone lg-input-icon"></i>
                        <input type="tel" id="phone" name="phone" placeholder="Phone number" required
                               class="lg-input" value="{{ signup_data.phone|default:'' }}">
                    </div>
                </div>

                <!-- Password -->
                <div class="lg-input-group reveal-lg" style="--d:7">
                    <i class="bi bi-lock lg-input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required
                           class="lg-input" autocomplete="new-password">
                    <button type="button" class="lg-toggle-pw" onclick="togglePw('password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <!-- Password strength bar -->
                <div class="su-strength-bar reveal-lg" style="--d:7">
                    <div class="su-strength-fill" id="strengthFill"></div>
                </div>

                <!-- Confirm Password -->
                <div class="lg-input-group reveal-lg" style="--d:8">
                    <i class="bi bi-lock-fill lg-input-icon"></i>
                    <input type="password" id="password2" name="password2" placeholder="Confirm password" required
                           class="lg-input" autocomplete="new-password">
                    <button type="button" class="lg-toggle-pw" onclick="togglePw('password2', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <!-- Submit -->
                <button type="submit" name="signup" class="lg-submit-btn group reveal-lg" style="--d:9">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        <i class="bi bi-rocket-takeoff"></i> Create Account
                    </span>
                </button>
            </form>

            <!-- Footer Links -->
            <div class="text-center mt-8 space-y-2 reveal-lg" style="--d:10">
                <p class="text-slate-500 text-sm">
                    Already have an account?
                    <a href="{% url 'login' %}" class="text-sky-600 hover:text-sky-700 font-semibold transition-colors">Log In</a>
                </p>
                <a href="{% url 'index' %}" class="inline-flex items-center gap-1 text-slate-500 hover:text-slate-700 text-xs transition-colors">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'global.js' %}"></script>
    <script>
    (function() {
        'use strict';

        /* ── Password Toggle ── */
        window.togglePw = function(id, btn) {
            var inp = document.getElementById(id);
            var icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        };

        /* ── Password Strength ── */
        var pwField = document.getElementById('password');
        var strengthFill = document.getElementById('strengthFill');
        if (pwField && strengthFill) {
            pwField.addEventListener('input', function() {
                var val = pwField.value;
                var score = 0;
                if (val.length >= 6) score++;
                if (val.length >= 10) score++;
                if (/[A-Z]/.test(val)) score++;
                if (/[0-9]/.test(val)) score++;
                if (/[^A-Za-z0-9]/.test(val)) score++;
                var pct = (score / 5) * 100;
                var color = pct <= 40 ? '#ef4444' : pct <= 70 ? '#f59e0b' : '#22c55e';
                strengthFill.style.width = pct + '%';
                strengthFill.style.background = color;
            });
        }

        /* ── Reveal Animation ── */
        var els = document.querySelectorAll('.reveal-lg');
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        els.forEach(function(el) { obs.observe(el); });

        /* ── Input Focus Glow ── */
        document.querySelectorAll('.lg-input').forEach(function(inp) {
            inp.addEventListener('focus', function() {
                inp.parentElement.classList.add('lg-focused');
            });
            inp.addEventListener('blur', function() {
                inp.parentElement.classList.remove('lg-focused');
            });
        });
    })();
    </script>
</body>
</html>
