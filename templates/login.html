{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'login.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter'] },
                    colors: { brand: '#6366f1', accent: '#f59e0b' }
                }
            }
        }
    </script>
    <title>Login — G11 Fashion & Toys</title>
</head>
<body class="font-inter min-h-screen overflow-x-hidden relative bg-slate-900">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-5 right-5 z-[9999] max-w-sm space-y-2 pointer-events-none"></div>

    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% for message in messages %}
            showToast('{{ message|escapejs }}', '{{ message.tags }}');
            {% endfor %}
        });
    </script>
    {% endif %}

    {% if form.non_field_errors %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% for error in form.non_field_errors %}
            showToast('{{ error|escapejs }}', 'error');
            {% endfor %}
        });
    </script>
    {% endif %}

    <!-- ══════ FULL-PAGE 3D ANIMATED BACKGROUND ══════ -->
    <div class="lg-bg-wrapper">
        <!-- Gradient overlay -->
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/95 via-indigo-950/90 to-slate-900/95 z-[1]"></div>

        <!-- Particle canvas (full screen) -->
        <canvas id="loginParticles" class="absolute inset-0 w-full h-full z-[2] pointer-events-none"></canvas>

        <!-- Floating geometric shapes -->
        <div class="absolute inset-0 z-[3] overflow-hidden pointer-events-none" aria-hidden="true">
            <div class="lg-shape lg-shape-1"></div>
            <div class="lg-shape lg-shape-2"></div>
            <div class="lg-shape lg-shape-3"></div>
            <div class="lg-shape lg-shape-4"></div>
            <div class="lg-shape lg-shape-5"></div>
            <div class="lg-shape lg-shape-6"></div>
            <div class="lg-shape lg-shape-7"></div>
            <div class="lg-shape lg-shape-8"></div>
        </div>

        <!-- Animated grid lines -->
        <div class="lg-grid-overlay"></div>
    </div>

    <!-- ══════ LOGIN FORM CARD ══════ -->
    <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
        <div class="lg-card reveal-lg" style="--d:0">

            <!-- Header -->
            <div class="text-center mb-8 reveal-lg" style="--d:1">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 mb-4">
                    <i class="bi bi-shield-lock-fill text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Welcome Back</h1>
                <p class="text-white/50 text-sm mt-1">Sign in to your G11 account</p>
            </div>

            <!-- Google OAuth Button -->
            <div class="reveal-lg" style="--d:2">
                <a href="/accounts/google/login/" class="lg-google-btn group">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span class="font-semibold text-sm">Continue with Google</span>
                </a>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6 reveal-lg" style="--d:3">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-white/30 text-xs font-medium uppercase tracking-wider">or sign in with email</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Login Form -->
            <form action="{% url 'login' %}" method="POST" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">

                <!-- Username -->
                <div class="lg-input-group reveal-lg" style="--d:4">
                    <i class="bi bi-person lg-input-icon"></i>
                    <input type="text" id="username" name="username" placeholder="Username" required
                           class="lg-input" autocomplete="username">
                </div>

                <!-- Password -->
                <div class="lg-input-group reveal-lg" style="--d:5">
                    <i class="bi bi-lock lg-input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required
                           class="lg-input" autocomplete="current-password">
                    <button type="button" class="lg-toggle-pw" onclick="togglePw('password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between reveal-lg" style="--d:6">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" name="remember" class="w-4 h-4 rounded border-white/20 bg-white/5 text-indigo-500 focus:ring-indigo-500/40">
                        <span class="text-white/40 text-sm group-hover:text-white/60 transition-colors">Remember me</span>
                    </label>
                    <a href="{% url 'password_reset' %}" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit -->
                <button type="submit" name="login" class="lg-submit-btn group reveal-lg" style="--d:7">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </span>
                </button>
            </form>

            <!-- Footer Links -->
            <div class="text-center mt-8 space-y-2 reveal-lg" style="--d:8">
                <p class="text-white/40 text-sm">
                    Don't have an account?
                    <a href="{% url 'signup' %}" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Sign Up</a>
                </p>
                <a href="{% url 'index' %}" class="inline-flex items-center gap-1 text-white/30 hover:text-white/60 text-xs transition-colors">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'global.js' %}"></script>
    <script>
    (function() {
        'use strict';

        /* ── Particle System ── */
        var canvas = document.getElementById('loginParticles');
        if (canvas) {
            var ctx = canvas.getContext('2d');
            var W, H, particles = [], mouse = { x: null, y: null };

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            document.addEventListener('mousemove', function(e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            function Particle() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.r = Math.random() * 2 + 0.5;
                this.dx = (Math.random() - 0.5) * 0.5;
                this.dy = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
            }

            for (var i = 0; i < 80; i++) particles.push(new Particle());

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(function(p) {
                    if (mouse.x !== null) {
                        var mdx = p.x - mouse.x, mdy = p.y - mouse.y;
                        var md = Math.sqrt(mdx * mdx + mdy * mdy);
                        if (md < 120) {
                            p.x += mdx / md * 1.5;
                            p.y += mdy / md * 1.5;
                        }
                    }
                    p.x += p.dx;
                    p.y += p.dy;
                    if (p.x < 0 || p.x > W) p.dx *= -1;
                    if (p.y < 0 || p.y > H) p.dy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(165,180,252,' + p.alpha + ')';
                    ctx.fill();
                });

                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(165,180,252,' + (0.12 * (1 - dist / 140)) + ')';
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        /* ── Password Toggle ── */
        window.togglePw = function(id, btn) {
            var inp = document.getElementById(id);
            var icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        };

        /* ── Reveal Animation ── */
        var els = document.querySelectorAll('.reveal-lg');
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        els.forEach(function(el) { obs.observe(el); });

        /* ── Input Focus Glow ── */
        document.querySelectorAll('.lg-input').forEach(function(inp) {
            inp.addEventListener('focus', function() {
                inp.parentElement.classList.add('lg-focused');
            });
            inp.addEventListener('blur', function() {
                inp.parentElement.classList.remove('lg-focused');
            });
        });
    })();
    </script>
</body>
</html>
