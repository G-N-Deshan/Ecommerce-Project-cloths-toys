{% load static %}

<section class="section-0">
    <nav class="navbar">
        <div>
            <!-- Logo on left -->
            <a href="{% url 'index' %}"><img src="{%static 'bird_2.jpg'%}" alt="logo" class="nav-logo"></a>
            
            <!-- Hamburger Toggle Button (mobile only) -->
            <button class="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('nav-open');this.setAttribute('aria-expanded',this.classList.contains('open'))">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>

            <!-- Navigation Links Centered -->
            <div class="nav-links-container">
                <button><a href="{% url 'index' %}" class="nav-link nav-link--home">Home</a></button>
                <button><a href="{% url 'buy' %}" class="nav-link nav-link--vehicles">BUY</a></button>
                <button><a href="{% url 'reviews' %}" class="nav-link nav-link--reviews"> Reviews</a></button>
                <button><a href="{% url 'contact_us' %}" class="nav-link nav-link--contact">Contact</a></button>
                <button><a href="{% url 'about' %}" class="nav-link nav-link--about">About</a></button>
                
                <!-- Search (icon-first, reveal on hover/focus) -->
                <form action="{% url 'search' %}" method="GET" class="nav-search-form" aria-label="Search products">
                    <input type="text" name="q" placeholder="Search products" class="nav-search-input" aria-label="Search query">
                    <button type="submit" class="nav-search-btn" title="Search" aria-label="Search">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M10.5 4a6.5 6.5 0 1 0 4.05 11.58l4.44 4.44a1 1 0 0 0 1.42-1.42l-4.44-4.44A6.5 6.5 0 0 0 10.5 4zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Cart Icon - Only for authenticated users -->
                {% if user.is_authenticated %}
                <a href="{% url 'cart_details' %}" class="cart-icon-link" title="Shopping Cart">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count-badge" data-cart-count>{{ cart_count|default:0 }}</span>
                </a>
                {% endif %}

                <!-- Mobile-only auth links -->
                {% if user.is_authenticated %}
                <button class="nav-mobile-auth"><a href="{% url 'profile' %}" class="nav-link">{{ user.username }}</a></button>
                <form method="post" action="{% url 'logout' %}" class="nav-mobile-auth" style="display:inline">{% csrf_token %}<button type="submit" class="nav-link nav-link--logout" style="background:none;border:none;cursor:pointer;font:inherit;padding:0.75rem 1.5rem;display:block;width:100%;text-align:left">Logout</button></form>
                {% else %}
                <button class="nav-mobile-auth"><a href="{% url 'login' %}" class="nav-link nav-link--login">Login</a></button>
                {% endif %}
            </div>

            <!-- Login/Logout on right (desktop) -->
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="nav-desktop-auth" style="display:inline">{% csrf_token %}<button type="submit" class="nav-link nav-link--logout" style="background:none;border:none;cursor:pointer;font:inherit;letter-spacing:0.2rem;padding:0.5rem;margin-right:2rem">Logout</button></form>
            <button class="user-profile-btn nav-desktop-auth" title="{{ user.username }}">
                <a href="{% url 'profile' %}" class="nav-link">{{ user.username }}</a>
            </button>
            {% else %}
            <button class="login-btn nav-desktop-auth"><a href="{% url 'login' %}" class="nav-link nav-link--login">Login</a></button>
            {% endif %}
        </div>
    </nav>
</section>
{% include 'includes/breadcrumbs.html' %}
