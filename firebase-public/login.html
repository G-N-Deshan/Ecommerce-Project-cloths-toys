<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — G11 Fashion & Toys</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body class="font-inter min-h-screen overflow-x-hidden relative bg-slate-900">
  <div id="toastContainer" class="fixed top-5 right-5 z-[9999] max-w-sm space-y-2 pointer-events-none"></div>

  <div class="lg-bg-wrapper">
    <div class="absolute inset-0 bg-gradient-to-br from-slate-900/95 via-indigo-950/90 to-slate-900/95 z-[1]"></div>
    <canvas id="loginParticles" class="absolute inset-0 w-full h-full z-[2] pointer-events-none"></canvas>
  </div>

  <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
    <div class="lg-card">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 mb-4">
          <i class="bi bi-shield-lock-fill text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-extrabold text-white tracking-tight">Welcome Back</h1>
        <p class="text-white/50 text-sm mt-1">Sign in to your G11 account</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div class="lg-input-group">
          <i class="bi bi-envelope lg-input-icon"></i>
          <input type="email" id="email" name="email" placeholder="Email" required class="lg-input" autocomplete="email" />
        </div>

        <div class="lg-input-group">
          <i class="bi bi-lock lg-input-icon"></i>
          <input type="password" id="password" name="password" placeholder="Password" required class="lg-input" autocomplete="current-password" />
          <button type="button" class="lg-toggle-pw" onclick="togglePw('password', this)">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>

        <button type="submit" class="lg-submit-btn group">
          <span class="relative z-10 flex items-center justify-center gap-2">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </span>
        </button>
      </form>

      <div class="text-center mt-8 space-y-2">
        <p class="text-white/40 text-sm">
          Don't have an account?
          <a href="/signup.html" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Sign Up</a>
        </p>
        <a href="/" class="inline-flex items-center gap-1 text-white/30 hover:text-white/60 text-xs transition-colors">
          <i class="bi bi-arrow-left"></i> Back to Home
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="/js/login-page.js"></script>
</body>
</html>
